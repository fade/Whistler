name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  # ========================================
  # Build Linux binary
  # ========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl make

      - name: Install ocicl
        run: |
          OCICL_VERSION=$(curl -s https://api.github.com/repos/ocicl/ocicl/releases/latest \
                          | grep '"tag_name"' \
                          | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -sLO "https://github.com/ocicl/ocicl/releases/latest/download/ocicl_${OCICL_VERSION}-1_amd64.deb"
          sudo dpkg -i "ocicl_${OCICL_VERSION}-1_amd64.deb"
          ocicl setup > ~/.sbclrc
          ocicl version

      - name: Fetch Lisp dependencies
        run: ocicl install

      - name: Build
        run: make

      - name: Verify
        run: |
          ./whistler --version
          ./whistler compile examples/count-xdp.lisp -o /tmp/count-xdp.bpf.o

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf whistler-${VERSION}-linux-amd64.tar.gz whistler README.md

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-package
          path: ./*.tar.gz

  # ========================================
  # Create GitHub Release
  # ========================================
  release:
    needs: [build-linux]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Extract version number
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          bodyFile: doc/release-notes/RELEASE-NOTES-${{ steps.get_version.outputs.version }}.md
          artifacts: |
            artifacts/linux-package/*.tar.gz
          allowUpdates: true
